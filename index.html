<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Royal | Mana Shamim Golsa</title>
    <link rel="icon" href="https://manashamim.ir/wp-content/uploads/2023/11/Mana-Shamim-Golsa-Logo-smal.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              royal: { DEFAULT: "#6a0dad", dark: "#8b008b", gold: "#daa829" },
            },
            fontFamily: {
              serif: ['"Times New Roman"', "Times", "serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="home" class="bg-gray-50 text-gray-800">
    <div id="site-header"></div>

    <!-- ============================== HERO SLIDESHOW ============================== -->
    <section class="relative h-[60vh] min-h-[320px] w-full overflow-hidden bg-royal sm:h-[70vh]">
      <img class="slide active" src="https://manashamim.com/wp-content/uploads/2024/10/s1-1024x485.jpg" alt="Royal banner 1" />
      <img class="slide" src="https://manashamim.com/wp-content/uploads/2024/10/20-1024x485.jpg" alt="Royal banner 2" />
      <img class="slide" src="https://manashamim.com/wp-content/uploads/2024/10/21-1024x486.jpg" alt="Royal banner 3" />
      <img class="slide" src="https://manashamim.com/wp-content/uploads/2024/10/s11-1024x486.jpg" alt="Royal banner 4" />

      <div class="absolute inset-0 bg-gradient-to-t from-royal-dark/70 via-transparent to-transparent"></div>
      <div class="absolute inset-0 flex flex-col items-center justify-end gap-4 pb-10 text-center px-4 sm:pb-16">
        <a href="shop.html" data-i18n="hero_shop_now"
           class="rounded-full bg-royal-gold px-8 py-3 text-sm font-bold uppercase tracking-wide text-royal-dark shadow-lg transition hover:scale-105 hover:bg-white sm:text-base"></a>
      </div>
    </section>

    <!-- ============================== ABOUT / BUSINESS SUMMARY ============================== -->
    <section class="bg-white py-16">
      <div class="mx-auto max-w-4xl px-4 sm:px-6 lg:px-8">
        <h2 class="reveal mb-8 text-center text-3xl font-bold text-royal" data-i18n="home_about_title"></h2>
        <div class="space-y-6 font-serif text-justify text-[1.05rem] leading-8 text-gray-700">
          <p class="reveal" data-i18n="home_about_p1"></p>
          <p class="reveal" data-i18n="home_about_p2"></p>
          <p class="reveal" data-i18n="home_about_p3"></p>
          <p class="reveal" data-i18n="home_about_p4"></p>
          <p class="reveal" data-i18n="home_about_p5"></p>
        </div>
      </div>
    </section>

    <!-- ============================== SHOP BY CATEGORY ============================== -->
    <section class="mx-auto max-w-7xl px-4 py-16 sm:px-6 lg:px-8">
      <h2 class="mb-8 text-center text-3xl font-bold text-royal" data-i18n="home_categories_title"></h2>
      <div id="category-grid" class="grid grid-cols-2 gap-4 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-7"></div>
    </section>

    <!-- ============================== FEATURED PRODUCTS ============================== -->
    <section class="bg-white py-16">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="mb-8 flex items-center justify-between">
          <h2 class="text-3xl font-bold text-royal" data-i18n="featured_products"></h2>
          <a href="shop.html" data-i18n="view_all" class="text-sm font-semibold text-royal-gold hover:underline"></a>
        </div>
        <div id="featured-grid" class="grid grid-cols-2 gap-4 sm:grid-cols-3 sm:gap-6 lg:grid-cols-4"></div>
      </div>
    </section>

    <!-- ============================== NEW ARRIVALS (auto-scroll carousel) ============================== -->
    <section class="py-16">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="mb-8 flex items-center justify-between">
          <h2 class="text-3xl font-bold text-royal" data-i18n="new_arrivals"></h2>
          <a href="shop.html" data-i18n="view_all" class="text-sm font-semibold text-royal-gold hover:underline"></a>
        </div>
      </div>
      <div id="new-arrivals-container" class="no-scrollbar overflow-x-hidden px-4 sm:px-6 lg:px-8">
        <div id="new-arrivals-list" class="flex w-max"></div>
      </div>
    </section>

    <div id="site-footer"></div>

    <!-- Scripts -->
    <script src="js/i18n.js"></script>
    <script src="data/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/product-render.js"></script>
    <script src="js/script.js"></script>
    <script src="js/home.js"></script>
  </body>
</html>
