<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">Product | Royal - Mana Shamim Golsa</title>
    <link rel="icon" href="https://manashamim.ir/wp-content/uploads/2023/11/Mana-Shamim-Golsa-Logo-smal.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              royal: { DEFAULT: "#6a0dad", dark: "#8b008b", gold: "#daa829" },
            },
            fontFamily: {
              serif: ['"Times New Roman"', "Times", "serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="shop" class="bg-gray-50 text-gray-800">
    <div id="site-header"></div>

    <!-- Breadcrumb -->
    <nav class="mx-auto max-w-7xl px-4 py-4 text-sm text-gray-500 sm:px-6 lg:px-8">
      <a href="index.html" class="hover:text-royal" data-i18n="nav_home"></a>
      <span class="mx-2">/</span>
      <a href="shop.html" class="hover:text-royal" data-i18n="nav_shop"></a>
      <span class="mx-2">/</span>
      <span id="breadcrumb-category" class="text-gray-700"></span>
    </nav>

    <!-- ============== Product not found ============== -->
    <div id="not-found" class="hidden mx-auto max-w-3xl px-4 py-20 text-center">
      <h1 class="text-2xl font-bold text-royal" data-i18n="no_results"></h1>
      <a href="shop.html" data-i18n="cart_continue_shopping" class="mt-4 inline-block rounded-full bg-royal px-6 py-2 text-sm font-bold text-white hover:bg-royal-dark"></a>
    </div>

    <!-- ============== Product detail ============== -->
    <section id="product-detail" class="mx-auto max-w-7xl px-4 pb-16 sm:px-6 lg:px-8">
      <div class="flex flex-col gap-10 lg:flex-row">

        <!-- Image gallery -->
        <div class="lg:w-1/2">
          <div id="gallery-main" class="relative aspect-square w-full overflow-hidden rounded-2xl bg-purple-50 shadow">
            <img id="gallery-main-image" src="" alt="" class="h-full w-full object-cover transition-transform duration-200" />
          </div>
          <div id="gallery-thumbs" class="mt-4 flex gap-3"></div>
        </div>

        <!-- Details -->
        <div class="lg:w-1/2">
          <span id="product-category" class="text-xs font-semibold uppercase tracking-wide text-royal-gold"></span>
          <h1 id="product-name" class="mt-1 text-2xl font-bold text-gray-800 sm:text-3xl"></h1>
          <p id="product-sku" class="mt-1 text-xs text-gray-400"></p>

          <p id="product-price" class="mt-4 text-3xl font-bold text-royal"></p>
          <p id="product-stock" class="mt-1 text-sm font-semibold"></p>

          <p id="product-description" class="mt-5 text-sm leading-7 text-gray-600"></p>

          <!-- Quantity + Add to cart -->
          <div class="mt-6 flex items-center gap-3" data-qty-wrapper>
            <div class="flex items-center rounded-full border border-gray-300">
              <button type="button" id="qty-decrease" class="px-4 py-2 text-lg text-gray-600">-</button>
              <input type="number" min="1" value="1" id="qty-input" data-qty-input class="w-14 border-0 text-center focus:ring-0" />
              <button type="button" id="qty-increase" class="px-4 py-2 text-lg text-gray-600">+</button>
            </div>
            <button type="button" id="add-to-cart-btn"
              class="flex-1 rounded-full bg-royal px-6 py-3 text-sm font-bold text-white shadow transition hover:bg-royal-dark">
              <span data-i18n="add_to_cart"></span>
            </button>
          </div>
          <a href="cart.html" id="buy-now-btn"
            class="mt-3 block w-full rounded-full border-2 border-royal px-6 py-3 text-center text-sm font-bold text-royal transition hover:bg-royal hover:text-white">
            <span data-i18n="buy_now"></span>
          </a>

          <!-- Long description / details -->
          <div class="mt-8 border-t border-gray-200 pt-6">
            <h2 class="mb-2 text-lg font-bold text-royal" data-i18n="details"></h2>
            <p id="product-long-description" class="font-serif text-[1.02rem] leading-7 text-gray-700"></p>
          </div>
        </div>
      </div>

      <!-- Related products -->
      <div class="mt-16">
        <h2 class="mb-6 text-2xl font-bold text-royal" data-i18n="related_products"></h2>
        <div id="related-grid" class="grid grid-cols-2 gap-4 sm:grid-cols-3 sm:gap-6 lg:grid-cols-4"></div>
      </div>
    </section>

    <div id="site-footer"></div>

    <!-- Scripts -->
    <script src="js/i18n.js"></script>
    <script src="data/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/product-render.js"></script>
    <script src="js/script.js"></script>
    <script src="js/product.js"></script>
  </body>
</html>
