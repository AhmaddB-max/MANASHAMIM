<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | Royal - Mana Shamim Golsa</title>
    <link rel="icon" href="https://manashamim.ir/wp-content/uploads/2023/11/Mana-Shamim-Golsa-Logo-smal.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              royal: { DEFAULT: "#6a0dad", dark: "#8b008b", gold: "#daa829" },
            },
            fontFamily: {
              serif: ['"Times New Roman"', "Times", "serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="contact" class="bg-gray-50 text-gray-800">
    <div id="site-header"></div>

    <!-- Page header banner -->
    <section class="bg-gradient-to-r from-royal to-royal-dark py-14 text-center text-white">
      <h1 class="text-3xl font-bold sm:text-4xl" data-i18n="contact_title"></h1>
    </section>

    <section class="mx-auto max-w-6xl px-4 py-12 sm:px-6 lg:px-8">
      <div class="flex flex-col gap-10 lg:flex-row">
        <!-- Contact form -->
        <div class="flex-1 rounded-2xl bg-white p-6 shadow ring-1 ring-gray-100 sm:p-8">
          <form id="contact-form" class="flex flex-col gap-4" novalidate>
            <input type="text" name="name" required
              data-i18n-placeholder="contact_form_name"
              class="w-full rounded-lg border border-gray-200 px-4 py-3 text-sm focus:border-royal focus:outline-none focus:ring-1 focus:ring-royal" />
            <input type="email" name="email" required
              data-i18n-placeholder="contact_form_email"
              class="w-full rounded-lg border border-gray-200 px-4 py-3 text-sm focus:border-royal focus:outline-none focus:ring-1 focus:ring-royal" />
            <input type="tel" name="phone"
              data-i18n-placeholder="contact_form_phone"
              class="w-full rounded-lg border border-gray-200 px-4 py-3 text-sm focus:border-royal focus:outline-none focus:ring-1 focus:ring-royal" />
            <textarea name="message" required rows="5"
              data-i18n-placeholder="contact_form_message"
              class="w-full rounded-lg border border-gray-200 px-4 py-3 text-sm focus:border-royal focus:outline-none focus:ring-1 focus:ring-royal"></textarea>
            <button type="submit" data-i18n="contact_form_submit"
              class="rounded-full bg-royal px-6 py-3 text-sm font-bold text-white shadow transition hover:bg-royal-dark"></button>
            <p id="contact-feedback" class="hidden rounded-lg p-3 text-center text-sm font-semibold"></p>
          </form>
        </div>

        <!-- Office info -->
        <div class="lg:w-96 lg:shrink-0">
          <div class="rounded-2xl bg-white p-6 shadow ring-1 ring-gray-100 sm:p-8">
            <h2 class="mb-4 text-lg font-bold text-royal" data-i18n="contact_office_title"></h2>
            <div class="space-y-4 text-sm text-gray-600">
              <div>
                <p class="font-semibold text-gray-700" data-i18n="footer_head_office"></p>
                <p data-i18n="footer_head_office_addr"></p>
              </div>
              <div>
                <p class="font-semibold text-gray-700" data-i18n="footer_factory"></p>
                <p data-i18n="footer_factory_addr"></p>
              </div>
              <div>
                <p>
                  <span class="font-semibold text-gray-700" data-i18n="contact_phone_label"></span>
                  <span dir="ltr" class="inline-block">021-22345578</span>
                </p>
              </div>
              <div>
                <p>
                  <span class="font-semibold text-gray-700" data-i18n="contact_email_label"></span>
                  <a href="mailto:info@manashamim.ir" dir="ltr" class="inline-block text-royal hover:underline" data-i18n="contact_email_value"></a>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Map section -->
    <section class="mx-auto max-w-6xl px-4 pb-14 sm:px-6 lg:px-8">
      <h2 class="mb-4 text-center text-2xl font-bold text-royal" data-i18n="contact_location_title"></h2>
      <div class="overflow-hidden rounded-2xl shadow ring-1 ring-gray-100">
        <iframe
          src="https://www.google.com/maps?q=Tehran,Saadat+Abad&output=embed"
          class="h-96 w-full border-0"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>
    </section>

    <div id="site-footer"></div>

    <!-- Scripts -->
    <script src="js/i18n.js"></script>
    <script src="data/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/product-render.js"></script>
    <script src="js/script.js"></script>
    <script src="js/contact.js"></script>
  </body>
</html>
