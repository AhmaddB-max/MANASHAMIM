<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart | Royal - Mana Shamim Golsa</title>
    <link rel="icon" href="https://manashamim.ir/wp-content/uploads/2023/11/Mana-Shamim-Golsa-Logo-smal.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              royal: { DEFAULT: "#6a0dad", dark: "#8b008b", gold: "#daa829" },
            },
            fontFamily: {
              serif: ['"Times New Roman"', "Times", "serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="cart" class="bg-gray-50 text-gray-800">
    <div id="site-header"></div>

    <section class="mx-auto max-w-5xl px-4 py-10 sm:px-6 lg:px-8">
      <h1 class="mb-8 text-3xl font-bold text-royal" data-i18n="cart_title"></h1>

      <!-- Empty cart state -->
      <div id="cart-empty" class="hidden flex-col items-center gap-4 rounded-2xl bg-white py-20 text-center shadow ring-1 ring-gray-100">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a1.125 1.125 0 00-1.077-1.452H4.243M7.5 14.25L5.106 5.272M7.5 14.25L4.5 18M16.5 18a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM9 18a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/></svg>
        <p class="text-lg font-bold text-gray-700" data-i18n="cart_empty"></p>
        <p class="text-sm text-gray-500" data-i18n="cart_empty_sub"></p>
        <a href="shop.html" data-i18n="cart_continue_shopping"
          class="mt-2 rounded-full bg-royal px-6 py-2.5 text-sm font-bold text-white shadow transition hover:bg-royal-dark"></a>
      </div>

      <!-- Cart contents -->
      <div id="cart-content" class="hidden flex-col gap-8 lg:flex-row">
        <div class="flex-1">
          <div class="overflow-hidden rounded-2xl bg-white shadow ring-1 ring-gray-100">
            <!-- Desktop header row -->
            <div class="hidden grid-cols-12 gap-4 border-b border-gray-100 px-6 py-3 text-xs font-bold uppercase tracking-wide text-gray-400 sm:grid">
              <div class="col-span-6" data-i18n="cart_product"></div>
              <div class="col-span-2 text-center" data-i18n="cart_price"></div>
              <div class="col-span-2 text-center" data-i18n="cart_qty"></div>
              <div class="col-span-2 text-end" data-i18n="cart_subtotal_col"></div>
            </div>
            <div id="cart-items"></div>
          </div>
        </div>

        <!-- Order summary -->
        <div class="lg:w-80 lg:shrink-0">
          <div class="sticky top-24 rounded-2xl bg-white p-6 shadow ring-1 ring-gray-100">
            <h2 class="mb-4 text-lg font-bold text-royal" data-i18n="checkout_order_summary"></h2>
            <div class="space-y-2 text-sm">
              <div class="flex justify-between">
                <span data-i18n="cart_subtotal"></span>
                <span id="summary-subtotal" class="font-semibold"></span>
              </div>
              <div class="flex justify-between text-gray-500">
                <span data-i18n="cart_shipping"></span>
                <span id="summary-shipping"></span>
              </div>
            </div>
            <div class="mt-4 flex justify-between border-t border-gray-200 pt-4 text-base font-bold text-royal">
              <span data-i18n="cart_total"></span>
              <span id="summary-total"></span>
            </div>
            <a href="checkout.html" data-i18n="cart_proceed"
              class="mt-6 block w-full rounded-full bg-royal px-6 py-3 text-center text-sm font-bold text-white shadow transition hover:bg-royal-dark"></a>
            <a href="shop.html" data-i18n="cart_continue_shopping"
              class="mt-3 block w-full rounded-full border border-gray-200 px-6 py-3 text-center text-sm font-semibold text-gray-600 transition hover:border-royal hover:text-royal"></a>
          </div>
        </div>
      </div>
    </section>

    <div id="site-footer"></div>

    <!-- Scripts -->
    <script src="js/i18n.js"></script>
    <script src="data/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/product-render.js"></script>
    <script src="js/script.js"></script>
    <script src="js/cart-page.js"></script>
  </body>
</html>
